<!DOCTYPE html>
<html lang="es">
<head>

</style>
</head>
<body>

<!-- WELCOME MODAL -->
<div class="welcome-overlay" id="welcome-overlay">
  <div class="welcome-box">
    <div class="welcome-ball">&#9917;</div>
    <div class="welcome-title">POLLA MUNDIAL</div>
    <div class="welcome-sub">FIFA World Cup 2026</div>
    <div class="welcome-admin-msg" id="welcome-admin-msg"></div>
    <div class="welcome-next" id="welcome-next">
      <div class="welcome-next-lbl">Próximo partido</div>
      <div id="welcome-match-info"><div class="loading-text" style="color:var(--text2)">Cargando...</div></div>
    </div>
    <button class="welcome-btn" onclick="closeWelcome()">Entrar al juego</button>
  </div>
</div>

<div class="header">
  <div class="header-top">
    <div class="logo">POLLA MUNDIAL<span>FIFA WORLD CUP 2026</span></div>
    <div class="header-right">
      <button class="refresh-btn" id="refresh-btn" onclick="refreshAll()"><span id="spin-icon">&#8635;</span> Actualizar</button>
      <button class="admin-btn" onclick="showAdminPage()">&#9881; Admin</button>
    </div>
  </div>
</div>

<nav class="nav">
  <button class="nav-btn active" onclick="showPage('inicio',this)">Inicio</button>
  <button class="nav-btn" onclick="showPage('leaderboard',this)">Ranking</button>
  <button class="nav-btn" onclick="showPage('grupos',this)">Grupos</button>
  <button class="nav-btn" onclick="showPage('apuestas',this)">Apuestas</button>
  <button class="nav-btn" onclick="showPage('estadisticas',this)">Stats</button>
  <button class="nav-btn" onclick="showPage('partidos',this)">Partidos</button>
  <button class="nav-btn" id="nav-admin" style="display:none" onclick="showPage('admin',this)">Admin</button>
</nav>

<!-- Páginas -->
<div id="page-inicio" class="page active"> <div id="inicio-content"></div> </div>
<div id="page-leaderboard" class="page"> <div id="lb-content"></div> </div>
<div id="page-grupos" class="page"> <div id="grupos-content"></div> </div>
<div id="page-apuestas" class="page"> <div id="pred-content"></div> </div>
<div id="page-estadisticas" class="page"> <div id="stats-content"></div> </div>
<div id="page-partidos" class="page"> <div id="cal-content"></div> </div>
<div id="page-admin" class="page"> ... (admin se mantiene igual) ... </div>

<div class="modal-overlay" id="deuda-modal"> ... </div>
<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbye7Slj-v4nuxc0kKuyYvN4eSstN7XYTBgED8PiqOWGOkD3k7eTjQTUnO8Wfkql6APD/exec';
const ADMIN_PASS = '2026';
const AVATARS = ['#e74c3c','#3498db','#2ecc71','#9b59b6','#f39c12','#1abc9c','#e67e22','#e91e63','#00bcd4','#8bc34a'];
const GRUPOS = ['A','B','C','D','E','F','G','H','I','J','K','L'];

let cache = {};
let lastUpdate = null;
let adminUnlocked = false;
let countdownInterval = null;
let adminMsg = localStorage.getItem('adminMsg') || '';

// ==================== NUEVA FUNCIÓN PARA FORMATO DE FECHA ====================
function fmtFechaHora(isoString) {
  if (!isoString) return '--';
  if (isoString.includes('T')) {
    const [fecha] = isoString.split('T');
    const date = new Date(fecha);
    const opciones = { weekday: 'short', day: '2-digit', month: 'short', year: 'numeric' };
    return date.toLocaleDateString('es-PY', opciones).replace(',', '');
  }
  return isoString;
}

function fmtHora(hora) {
  if (!hora) return '';
  return hora.substring(0,5);
}

function fmtGs(n) { return 'Gs. ' + Number(n||0).toLocaleString('es-PY'); }
function fmtTime(d) { return d ? d.toLocaleTimeString('es-PY',{hour:'2-digit',minute:'2-digit'}) : '--'; }
function errHTML(fn) { return `<div class="error-state"><div class="error-text">No se pudieron cargar los datos.</div><button class="btn btn-gold" onclick="${fn}()">Reintentar</button></div>`; }

// ── WELCOME ───────────────────────────────────────────────────────────────────
async function initWelcome() {
  if (adminMsg) {
    const msgEl = document.getElementById('welcome-admin-msg');
    msgEl.textContent = adminMsg;
    msgEl.classList.add('show');
  }
  try {
    const calRaw = await get('calendario');
    const cal = calRaw.slice(1);
    cache.calendario = calRaw;
    const nextMatch = cal.find(p => p[8] !== 'Finalizado' && p[4] && p[7]);
    if (nextMatch) renderWelcomeMatch(nextMatch);
  } catch(e) {}
}

function renderWelcomeMatch(p) {
  const el = document.getElementById('welcome-match-info');
  el.innerHTML = `
    <div class="welcome-match">
      <div class="welcome-team home">${p[4]}</div>
      <div class="welcome-vs">VS</div>
      <div class="welcome-team away">${p[7]}</div>
    </div>
    <div class="welcome-date">Grupo ${p[1]} - ${fmtFechaHora(p[2])} ${fmtHora(p[3])}</div>
    <div class="countdown" id="cd-welcome">...</div>`;
  startCountdown(p[2], p[3], 'cd-d','cd-h','cd-m','cd-s');
}

// ── INICIO ────────────────────────────────────────────────────────────────────
async function renderInicio() {
  const el = document.getElementById('inicio-content');
  el.innerHTML = '<div class="loading-state"><div class="loading-spinner"></div><div class="loading-text">Cargando...</div></div>';
  try {
    const [lbRaw, calRaw] = await Promise.all([get('leaderboard'), cache.calendario ? Promise.resolve(cache.calendario) : get('calendario')]);
    const lb = lbRaw.slice(1);
    const cal = (cache.calendario||calRaw).slice(1);
    lastUpdate = new Date();
    const jugados = cal.filter(p=>p[8]==='Finalizado').length;
    const totalMultas = lb.reduce((s,r)=>s+(Number(r[2])||0),0);
    const pozo = lb.length * 10000 + totalMultas;
    const nextMatch = cal.find(p=>p[8]!=='Finalizado'&&p[4]&&p[7]);

    let html = adminMsg ? `<div class="admin-msg-banner show"><strong>Aviso del organizador</strong>${adminMsg}</div>` : '';

    if (nextMatch) {
      html += `<div class="cd-banner">
        <div class="cd-banner-lbl">Próximo partido - Grupo ${nextMatch[1]}</div>
        <div class="cd-banner-match">
          <div class="cd-banner-team h">${nextMatch[4]}</div>
          <div class="cd-banner-vs">VS</div>
          <div class="cd-banner-team a">${nextMatch[7]}</div>
        </div>
        <div style="font-size:10px;color:var(--text2);text-align:center;margin-bottom:8px">${fmtFechaHora(nextMatch[2])} ${fmtHora(nextMatch[3])}</div>
        <!-- countdown chips -->
      </div>`;
    }

    // ... resto del HTML de resumen (pozo, stats, top3) se mantiene igual ...
    el.innerHTML = html;
    if (nextMatch) startCountdown(nextMatch[2], nextMatch[3], 'icd-d','icd-h','icd-m','icd-s');
  } catch(e) { el.innerHTML = errHTML('renderInicio'); }
}

// ── PARTIDOS ──────────────────────────────────────────────────────────────────
async function renderPartidos() {
  const el = document.getElementById('cal-content');
  el.innerHTML = '<div class="loading-state"><div class="loading-spinner"></div></div>';
  try {
    const raw = cache.calendario || await get('calendario');
    const cal = raw.slice(1);
    const grupos = [...new Set(cal.map(p=>p[1]))].filter(Boolean);
    let html = `<div class="info-box"><strong>${cal.filter(p=>p[8]==='Finalizado').length}/72 partidos jugados</strong> Horarios en hora de Paraguay</div>`;

    grupos.forEach(g => {
      const ps = cal.filter(p => p[1] === g);
      html += `<div class="match-group-title">Grupo ${g}</div>`;
      ps.forEach(p => {
        const ok = p[8] === 'Finalizado';
        const isNext = false; // puedes mejorar esto si quieres
        html += `<div class="match-card ${ok?'played':isNext?'today':'pending'}">
          <div class="match-header">
            <div class="match-grp">Grupo ${g}</div>
            <div class="match-date">${fmtFechaHora(p[2])} ${fmtHora(p[3])}</div>
          </div>
          <div class="match-teams">
            <div class="team-name team-home">${p[4]}</div>
            <div class="score-box">
              <div class="score ${ok&&p[5]>p[6]?'winner':''}">${ok?p[5]:'--'}</div>
              <div class="score-sep">:</div>
              <div class="score ${ok&&p[6]>p[5]?'winner':''}">${ok?p[6]:'--'}</div>
            </div>
            <div class="team-name team-away">${p[7]}</div>
          </div>
        </div>`;
      });
    });
    el.innerHTML = html;
  } catch(e) { el.innerHTML = errHTML('renderPartidos'); }
}

// ── ADMIN ─────────────────────────────────────────────────────────────────────
async function loadAdminData() {
  try {
    const [calRaw] = await Promise.all([get('calendario')]);
    const cal = calRaw.slice(1);
    const pendientes = cal.filter(p => p[8] !== 'Finalizado');
    const sel = document.getElementById('partido-select');

    sel.innerHTML = '<option value="">-- Elegir partido pendiente --</option>' +
      pendientes.map(p => {
        const fila = cal.indexOf(p) + 2;
        const fechaHora = `${fmtFechaHora(p[2])} ${fmtHora(p[3])}`;
        return `<option value="${fila}|${p[4]}|${p[7]}">[Gr.${p[1]}] ${fechaHora} - ${p[4]} vs ${p[7]}</option>`;
      }).join('');

    // ... resto del loadAdminData se mantiene igual ...
  } catch(e) { showToast('Error cargando datos admin','error'); }
}

// Resto de funciones (leaderboard, grupos, apuestas, etc.) se mantienen igual...
// (Para no alargar demasiado, solo cambié las partes relevantes)

function showPage(name,btn) { /* igual que antes */ }
function refreshAll() { /* igual */ }
// ... resto del script ...

initWelcome();
</script>
</body>
</html>
